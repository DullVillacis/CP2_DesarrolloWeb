    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&amp;family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <title>FoodRescue</title>
  <style type="text/css" data-vite-dev-id="C:/Users/ronny/Desktop/DW/CP2_DesarrolloWeb/frontend/src/index.css">:root {
  --verde: #12b886;
  --verde-2: #0ca678;
  --coral: #ff6b4a;
  --coral-2: #f0502e;
  --mango: #ffc53d;

  --crema: #fff9f2;
  --crema-2: #fff1e6;
  --blanco: #ffffff;
  --tinta: #1b2a2f;
  --tinta-suave: #5b6b70;
  --borde: #efe6da;

  --error: #fa5252;
  --error-bg: #fff0f0;
  --exito: #12b886;

  --sombra-sm: 0 2px 10px rgba(27, 42, 47, 0.06);
  --sombra: 0 10px 30px rgba(27, 42, 47, 0.1);
  --sombra-lg: 0 20px 50px rgba(27, 42, 47, 0.15);

  --radio-sm: 10px;
  --radio: 16px;
  --radio-lg: 26px;
  --radio-full: 999px;

  --grad-verde: linear-gradient(135deg, #12b886, #0ca678);
  --grad-coral: linear-gradient(135deg, #ff6b4a, #ffc53d);

  --fuente: "Poppins", "Segoe UI", system-ui, sans-serif;
  --fuente-display: "Fraunces", Georgia, serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--fuente);
  color: var(--tinta);
  background: var(--crema);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a {
  color: inherit;
  text-decoration: none;
}

h1,
h2,
h3 {
  font-family: var(--fuente-display);
  line-height: 1.15;
  font-weight: 700;
}

.contenedor {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--fuente);
  font-weight: 600;
  font-size: 0.98rem;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radio-full);
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-primary {
  background: var(--grad-verde);
  color: #fff;
  box-shadow: 0 8px 20px rgba(18, 184, 134, 0.35);
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 12px 26px rgba(18, 184, 134, 0.45);
}

.btn-coral {
  background: var(--grad-coral);
  color: #fff;
  box-shadow: 0 8px 20px rgba(255, 107, 74, 0.35);
}
.btn-coral:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 12px 26px rgba(255, 107, 74, 0.45);
}

.btn-outline {
  background: transparent;
  color: var(--verde-2);
  border: 2px solid var(--verde);
}
.btn-outline:hover:not(:disabled) {
  background: rgba(18, 184, 134, 0.08);
  transform: translateY(-2px);
}

.btn-ghost {
  background: transparent;
  color: var(--tinta-suave);
}
.btn-ghost:hover:not(:disabled) {
  background: rgba(27, 42, 47, 0.06);
}

.btn-danger {
  background: transparent;
  color: var(--error);
  border: 2px solid rgba(250, 82, 82, 0.35);
}
.btn-danger:hover:not(:disabled) {
  background: rgba(250, 82, 82, 0.1);
  border-color: var(--error);
}

.btn-lg {
  padding: 15px 32px;
  font-size: 1.05rem;
}

.btn-block {
  width: 100%;
  margin-top: 8px;
}

.campo {
  margin-bottom: 16px;
  text-align: left;
}

.campo-label {
  display: block;
  font-size: 0.88rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--tinta);
}

.campo-input {
  width: 100%;
  font-family: var(--fuente);
  font-size: 0.98rem;
  padding: 12px 16px;
  border: 2px solid var(--borde);
  border-radius: var(--radio);
  background: var(--blanco);
  color: var(--tinta);
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
}
.campo-input::placeholder {
  color: #b3aca2;
}
.campo-input:focus {
  outline: none;
  border-color: var(--verde);
  box-shadow: 0 0 0 4px rgba(18, 184, 134, 0.12);
}
.campo-input--error {
  border-color: var(--error);
}
.campo-error {
  display: block;
  color: var(--error);
  font-size: 0.82rem;
  margin-top: 5px;
}

.alerta {
  padding: 12px 16px;
  border-radius: var(--radio);
  font-size: 0.9rem;
  margin-bottom: 16px;
  text-align: left;
}
.alerta-error {
  background: var(--error-bg);
  color: var(--error);
  border: 1px solid rgba(250, 82, 82, 0.25);
}
.alerta-exito {
  background: rgba(18, 184, 134, 0.1);
  color: var(--verde-2);
  border: 1px solid rgba(18, 184, 134, 0.25);
}

.navbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 40px;
  background: rgba(255, 249, 242, 0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--borde);
}
.navbar-logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--fuente-display);
  font-weight: 800;
  font-size: 1.35rem;
  color: var(--verde-2);
}
.navbar-links {
  display: flex;
  align-items: center;
  gap: 22px;
  font-weight: 500;
}
.navbar-links a:hover {
  color: var(--verde-2);
}
.navbar-user {
  color: var(--tinta-suave);
  font-size: 0.92rem;
}

.hero {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 40px;
  align-items: center;
  max-width: 1100px;
  margin: 0 auto;
  padding: 70px 24px 50px;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--crema-2);
  color: var(--coral-2);
  font-weight: 600;
  font-size: 0.85rem;
  padding: 7px 16px;
  border-radius: var(--radio-full);
  margin-bottom: 18px;
}
.hero-titulo {
  font-size: 3.2rem;
  font-weight: 800;
  margin-bottom: 18px;
}
.destacado {
  color: var(--coral);
  white-space: nowrap;
}
.hero-texto {
  font-size: 1.15rem;
  color: var(--tinta-suave);
  margin-bottom: 30px;
  max-width: 480px;
}
.hero-acciones {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.hero-visual {
  position: relative;
  min-height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-blob {
  position: absolute;
  inset: 0;
  margin: auto;
  width: 320px;
  height: 320px;
  background: var(--grad-verde);
  border-radius: 44% 56% 62% 38% / 42% 46% 54% 58%;
  opacity: 0.18;
  filter: blur(6px);
  animation: flotar 6s ease-in-out infinite;
}
.hero-card {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--blanco);
  padding: 16px 20px;
  border-radius: var(--radio-lg);
  box-shadow: var(--sombra);
  width: 240px;
}
.hero-card--1 {
  transform: translate(-40px, -60px) rotate(-4deg);
}
.hero-card--2 {
  transform: translate(40px, 60px) rotate(4deg);
}
.hero-card-icono {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: rgba(18, 184, 134, 0.12);
  color: var(--verde-2);
  flex-shrink: 0;
}
.hero-card strong {
  font-size: 0.98rem;
}
.hero-card p {
  font-size: 0.9rem;
  color: var(--tinta-suave);
}
.precio-rescate {
  color: var(--verde-2);
  font-weight: 700;
}

@keyframes flotar {
  0%,
  100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-16px);
  }
}

.features {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  max-width: 1100px;
  margin: 20px auto;
  padding: 20px 24px 60px;
}
.feature-card {
  background: var(--blanco);
  border: 1px solid var(--borde);
  border-radius: var(--radio-lg);
  padding: 30px 26px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.feature-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--sombra);
}
.feature-card h3 {
  font-size: 1.25rem;
  margin-bottom: 8px;
}
.feature-card p {
  color: var(--tinta-suave);
  font-size: 0.95rem;
}

.icono-circulo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 54px;
  height: 54px;
  border-radius: 16px;
  background: rgba(18, 184, 134, 0.12);
  color: var(--verde-2);
  margin-bottom: 14px;
}
.icono-circulo--coral {
  background: rgba(255, 107, 74, 0.12);
  color: var(--coral-2);
}
.icono-inline {
  vertical-align: middle;
  color: var(--coral);
}

.footer {
  text-align: center;
  padding: 30px 24px;
  color: var(--tinta-suave);
  font-size: 0.9rem;
  border-top: 1px solid var(--borde);
}

.auth-pagina {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  background: radial-gradient(
      circle at 20% 20%,
      rgba(18, 184, 134, 0.1),
      transparent 40%
    ),
    radial-gradient(circle at 80% 80%, rgba(255, 107, 74, 0.1), transparent 40%),
    var(--crema);
}
.auth-tarjeta {
  width: 100%;
  max-width: 430px;
  background: var(--blanco);
  border-radius: var(--radio-lg);
  box-shadow: var(--sombra-lg);
  padding: 40px 36px;
  text-align: center;
}
.auth-tarjeta--ancha {
  max-width: 760px;
}
.auth-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 20px;
  text-align: left;
}
.auth-form-grid .btn-block {
  grid-column: 1 / -1;
  margin-top: 6px;
}
@media (max-width: 620px) {
  .auth-form-grid {
    grid-template-columns: 1fr;
  }
}
.auth-logo {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--fuente-display);
  font-weight: 800;
  font-size: 1.3rem;
  color: var(--verde-2);
  margin-bottom: 18px;
}
.auth-tarjeta h2 {
  font-size: 1.7rem;
  margin-bottom: 4px;
}
.auth-sub {
  color: var(--tinta-suave);
  margin-bottom: 24px;
}
.auth-pie {
  margin-top: 20px;
  font-size: 0.92rem;
  color: var(--tinta-suave);
}
.auth-pie a {
  color: var(--verde-2);
  font-weight: 600;
}

.rol-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 22px;
}
.rol-opcion {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 16px 10px;
  background: var(--crema);
  border: 2px solid var(--borde);
  border-radius: var(--radio);
  cursor: pointer;
  font-family: var(--fuente);
  transition: all 0.18s ease;
}
.rol-opcion:hover {
  border-color: var(--verde);
}
.rol-opcion.activa {
  border-color: var(--verde);
  background: rgba(18, 184, 134, 0.08);
}
.rol-icono {
  display: inline-flex;
  color: var(--verde-2);
}
.rol-nombre {
  font-weight: 600;
  font-size: 0.92rem;
}
.rol-desc {
  font-size: 0.76rem;
  color: var(--tinta-suave);
}

.loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  min-height: 60vh;
  color: var(--tinta-suave);
}
.loader-spinner {
  width: 44px;
  height: 44px;
  border: 4px solid var(--borde);
  border-top-color: var(--verde);
  border-radius: 50%;
  animation: girar 0.8s linear infinite;
}
@keyframes girar {
  to {
    transform: rotate(360deg);
  }
}

.dashboard-cabecera {
  margin-bottom: 34px;
}
.dashboard-cabecera h1 {
  font-size: 2.4rem;
  margin: 10px 0 6px;
}
.dashboard-sub {
  color: var(--tinta-suave);
  font-size: 1.05rem;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: var(--radio-full);
}
.chip-verde {
  background: rgba(18, 184, 134, 0.12);
  color: var(--verde-2);
}
.chip-coral {
  background: rgba(255, 107, 74, 0.12);
  color: var(--coral-2);
}

.dashboard-pagina {
  min-height: calc(100vh - 74px);
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.acciones-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}
.accion-card {
  position: relative;
  overflow: hidden;
  background: var(--blanco);
  border: 1px solid var(--borde);
  border-radius: var(--radio-lg);
  padding: 28px 24px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.accion-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--sombra);
}
.accion-card-bg {
  position: absolute;
  top: -26px;
  right: -22px;
  color: var(--verde);
  opacity: 0.1;
  pointer-events: none;
}
.accion-card--coral .accion-card-bg {
  color: var(--coral);
}
.accion-card-conteo {
  position: relative;
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--fuente-display);
  font-weight: 800;
  font-size: 2.6rem;
  line-height: 1;
  color: var(--verde-2);
  margin-bottom: 14px;
}
.accion-card--coral .accion-card-conteo {
  color: var(--coral-2);
}
.accion-card-conteo small {
  font-family: var(--fuente);
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--tinta-suave);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.accion-card h3 {
  position: relative;
  font-size: 1.2rem;
  margin-bottom: 6px;
}
.accion-card p {
  position: relative;
  color: var(--tinta-suave);
  font-size: 0.92rem;
}

@media (max-width: 860px) {
  .hero {
    grid-template-columns: 1fr;
    text-align: center;
    padding-top: 40px;
  }
  .hero-texto {
    margin-left: auto;
    margin-right: auto;
  }
  .hero-acciones {
    justify-content: center;
  }
  .hero-visual {
    min-height: 300px;
    margin-top: 20px;
  }
  .hero-titulo {
    font-size: 2.4rem;
  }
  .features {
    grid-template-columns: 1fr;
  }
  .navbar {
    padding: 14px 20px;
  }
  .navbar-links {
    gap: 14px;
    font-size: 0.9rem;
  }
  .navbar-user {
    display: none;
  }
}

.pagina-titulo {
  font-size: 2.2rem;
  margin-bottom: 4px;
}
.pagina-sub {
  color: var(--tinta-suave);
  margin-bottom: 26px;
}
.pagina-cabecera {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}
.contenedor-angosto {
  max-width: 620px;
}

.filtros {
  display: flex;
  align-items: flex-end;
  gap: 14px;
  background: var(--blanco);
  border: 1px solid var(--borde);
  border-radius: var(--radio-lg);
  padding: 18px 20px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}
.filtros .campo {
  margin-bottom: 0;
  flex: 1;
  min-width: 150px;
}
.filtros--compacto {
  display: inline-flex;
}
.filtros--compacto .campo {
  flex: 0 1 260px;
}

.ofertas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 22px;
}
.oferta-card {
  background: var(--blanco);
  border: 1px solid var(--borde);
  border-radius: var(--radio-lg);
  padding: 22px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--sombra-sm);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.oferta-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--sombra);
}
.oferta-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.badge {
  background: rgba(18, 184, 134, 0.12);
  color: var(--verde-2);
  font-size: 0.76rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: var(--radio-full);
}
.estado {
  font-size: 0.78rem;
  font-weight: 600;
}
.estado-ok {
  color: var(--verde-2);
}
.estado-agotado {
  color: var(--coral-2);
}
.oferta-titulo {
  font-size: 1.2rem;
  margin-bottom: 6px;
}
.oferta-desc {
  color: var(--tinta-suave);
  font-size: 0.9rem;
  margin-bottom: 12px;
}
.oferta-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--tinta-suave);
  font-size: 0.85rem;
  margin-bottom: 6px;
}
.oferta-precio {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin: 12px 0 16px;
}
.precio-original {
  color: var(--tinta-suave);
  text-decoration: line-through;
